name: FE Check

on:
  pull_request:
    branches: [master]
    paths:
      - 'web/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'astro.config.mjs'
      - 'tsconfig.json'
      - '.prettierrc'
      - '.github/workflows/fe-check.yml'

jobs:
  check:
    name: Astro check + build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Astro check
        run: pnpm check

      - name: Build
        run: pnpm build
